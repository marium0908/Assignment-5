<!DOCTYPE html>
<html>
<head>
<title>GitHub Issues Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 pb-40">

<div class="bg-white shadow p-4">

<div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-3">

<h1 class="text-lg md:text-xl font-bold flex items-center gap-2">
<img src="assets/github-logo.png" class="w-[36px] h-[37px]">
GitHub Issues Tracker
</h1>

<div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">

<input
id="searchInput"
placeholder="Search issues..."
class="border px-3 py-2 rounded w-full sm:w-64"
/>

<button
onclick="searchIssues()"
class="bg-[#4A00FF] text-white px-4 py-2 rounded w-full sm:w-auto"
>
+ New Issue
</button>

</div>

</div>
</div>


<div class="max-w-7xl mx-auto px-4 mt-6">

<div class="flex gap-2 mb-4 overflow-x-auto">

<button
onclick="loadIssues('all',this)"
class="tabBtn bg-[#4A00FF] text-white px-4 py-2 rounded whitespace-nowrap"
>
All
</button>

<button
onclick="loadIssues('open',this)"
class="tabBtn bg-gray-200 px-4 py-2 rounded whitespace-nowrap"
>
Open
</button>

<button
onclick="loadIssues('closed',this)"
class="tabBtn bg-gray-200 px-4 py-2 rounded whitespace-nowrap"
>
Closed
</button>

</div>


<div class="bg-white p-4 rounded shadow flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">

<div class="flex items-center gap-3">

<img src="assets/Aperture.png">

<div>
<h3 class="font-semibold text-sm md:text-base">
<span id="issueCount">0</span> Issues
</h3>

<p class="text-xs md:text-sm text-gray-500">
Track and manage your project issues
</p>
</div>

</div>

<div class="flex gap-4 text-xs md:text-sm">

<div class="flex items-center gap-1">
<img src="assets/green.png"> Open
</div>

<div class="flex items-center gap-1">
<img src="assets/purple.png"> Closed
</div>

</div>

</div>

<div
id="issuesContainer"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"
></div>

</div>


<div
id="modal"
class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center p-4"
>

<div class="bg-white p-6 rounded-lg w-full max-w-lg shadow-xl">

<div id="modalContent"></div>

<div class="flex justify-end mt-6">
<button
onclick="closeModal()"
class="bg-[#4A00FF] text-white px-4 py-2 rounded w-full sm:w-auto"
>
Close
</button>
</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
