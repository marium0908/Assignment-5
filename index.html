<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 font-[Inter] flex items-center justify-center min-h-screen px-4">

<div class="bg-white w-full max-w-sm p-8 rounded-xl shadow text-center">

<img src="assets/github-logo.png" class="w-14 mx-auto mb-4">

<h1 class="text-lg font-semibold">GitHub Issues Tracker</h1>
<p class="text-sm text-gray-500 mb-6">Sign in to manage your issues</p>

<div class="text-left mb-4">
<label class="text-sm">Username</label>
<input id="username" class="w-full border p-2 rounded mt-1" placeholder="Enter Username">
<p class="text-xs text-indigo-600 mt-1">Default: admin</p>
</div>

<div class="text-left mb-6">
<label class="text-sm">Password</label>
<input id="password" type="password" class="w-full border p-2 rounded mt-1" placeholder="Enter Password">
<p class="text-xs text-indigo-600 mt-1">Default: admin123</p>
</div>

<button onclick="login()" class="w-full bg-indigo-600 text-white py-2 rounded">
Sign In
</button>

<div class="flex items-center my-5">
<div class="flex-1 border-t"></div>
<span class="px-3 text-xs text-gray-400">OR</span>
<div class="flex-1 border-t"></div>
</div>

<div class="bg-gray-100 p-3 rounded text-sm">
<p><b>Username:</b> admin</p>
<p><b>Password:</b> admin123</p>
</div>

</div>

<script>

function login(){

const username=document.getElementById("username").value.trim()
const password=document.getElementById("password").value.trim()

if(!username || !password){
alert("Please enter username and password")
return
}

if(username==="admin" && password==="admin123"){

// Login protection added
localStorage.setItem("loggedIn","true")

window.location.href="dashboard.html"

}else{
alert("Invalid credentials")
}

}

</script>

</body>
</html>
